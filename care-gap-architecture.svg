<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 600 16px "Segoe UI", Arial, sans-serif; fill: #1a1a1a; }
      .label { font: 12px "Segoe UI", Arial, sans-serif; fill: #1a1a1a; }
      .node { fill: #f7f7f9; stroke: #333; stroke-width: 1; rx: 8; ry: 8; }
      .group { fill: #f1f5ff; stroke: #5b6b9a; stroke-width: 1.2; rx: 10; ry: 10; }
      .arrow { stroke: #333; stroke-width: 1.2; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Groups -->
  <rect class="group" x="40" y="40" width="280" height="360"/>
  <text class="title" x="60" y="70">Data Sources</text>

  <rect class="group" x="360" y="40" width="300" height="360"/>
  <text class="title" x="380" y="70">Ingestion &amp; Storage</text>

  <rect class="group" x="700" y="40" width="300" height="360"/>
  <text class="title" x="720" y="70">ML + Rules Intelligence</text>

  <rect class="group" x="1040" y="40" width="320" height="360"/>
  <text class="title" x="1060" y="70">Clinical Workflow Outputs</text>

  <rect class="group" x="700" y="460" width="660" height="320"/>
  <text class="title" x="720" y="490">Monitoring &amp; Governance</text>

  <!-- Nodes: Sources -->
  <rect class="node" x="60" y="100" width="240" height="40"/>
  <text class="label" x="70" y="125">EHR/EMR (FHIR/HL7, CCD)</text>

  <rect class="node" x="60" y="160" width="240" height="40"/>
  <text class="label" x="70" y="185">Labs &amp; Imaging</text>

  <rect class="node" x="60" y="220" width="240" height="40"/>
  <text class="label" x="70" y="245">Pharmacy Claims/Refills</text>

  <rect class="node" x="60" y="280" width="240" height="40"/>
  <text class="label" x="70" y="305">Scheduling System</text>

  <rect class="node" x="60" y="340" width="240" height="40"/>
  <text class="label" x="70" y="365">Patient Engagement (SMS/Portal)</text>

  <!-- Nodes: Ingestion -->
  <rect class="node" x="380" y="120" width="260" height="40"/>
  <text class="label" x="390" y="145">Ingestion Services</text>

  <rect class="node" x="380" y="180" width="260" height="40"/>
  <text class="label" x="390" y="205">Clinical Data Lakehouse</text>

  <rect class="node" x="380" y="240" width="260" height="40"/>
  <text class="label" x="390" y="265">Curated Patient Tables</text>

  <rect class="node" x="380" y="300" width="260" height="40"/>
  <text class="label" x="390" y="325">Feature Store</text>

  <!-- Nodes: Intelligence -->
  <rect class="node" x="720" y="120" width="260" height="40"/>
  <text class="label" x="730" y="145">Guideline Rules Engine</text>

  <rect class="node" x="720" y="180" width="260" height="40"/>
  <text class="label" x="730" y="205">ML Scoring Service</text>

  <rect class="node" x="720" y="240" width="260" height="40"/>
  <text class="label" x="730" y="265">Fusion &amp; Prioritization</text>

  <!-- Nodes: Outputs -->
  <rect class="node" x="1060" y="100" width="280" height="40"/>
  <text class="label" x="1070" y="125">Care Gap Alerts (EHR/Worklist)</text>

  <rect class="node" x="1060" y="160" width="280" height="40"/>
  <text class="label" x="1070" y="185">Appointment Optimization</text>

  <rect class="node" x="1060" y="220" width="280" height="40"/>
  <text class="label" x="1070" y="245">Auto-Drafted Clinical Notes</text>

  <rect class="node" x="1060" y="280" width="280" height="40"/>
  <text class="label" x="1070" y="305">Patient Reminders</text>

  <!-- Nodes: Governance -->
  <rect class="node" x="740" y="540" width="280" height="40"/>
  <text class="label" x="750" y="565">Model &amp; Data Monitoring</text>

  <rect class="node" x="740" y="600" width="280" height="40"/>
  <text class="label" x="750" y="625">Audit Logs &amp; Explainability</text>

  <!-- Arrows: Sources to Ingestion -->
  <line class="arrow" x1="300" y1="120" x2="380" y2="140"/>
  <line class="arrow" x1="300" y1="180" x2="380" y2="140"/>
  <line class="arrow" x1="300" y1="240" x2="380" y2="140"/>
  <line class="arrow" x1="300" y1="300" x2="380" y2="140"/>
  <line class="arrow" x1="300" y1="360" x2="380" y2="140"/>

  <!-- Ingestion flow -->
  <line class="arrow" x1="510" y1="160" x2="510" y2="180"/>
  <line class="arrow" x1="510" y1="220" x2="510" y2="240"/>
  <line class="arrow" x1="510" y1="280" x2="510" y2="300"/>

  <!-- Curated + Feature Store to Intelligence -->
  <line class="arrow" x1="640" y1="260" x2="720" y2="140"/>
  <line class="arrow" x1="640" y1="320" x2="720" y2="200"/>

  <!-- Rules + ML to Fusion -->
  <line class="arrow" x1="850" y1="160" x2="850" y2="240"/>
  <line class="arrow" x1="850" y1="220" x2="850" y2="240"/>

  <!-- Fusion to Outputs -->
  <line class="arrow" x1="980" y1="260" x2="1060" y2="120"/>
  <line class="arrow" x1="980" y1="260" x2="1060" y2="180"/>
  <line class="arrow" x1="980" y1="260" x2="1060" y2="240"/>
  <line class="arrow" x1="980" y1="260" x2="1060" y2="300"/>

  <!-- Monitoring links -->
  <line class="arrow" x1="850" y1="220" x2="880" y2="540"/>
  <line class="arrow" x1="850" y1="160" x2="880" y2="540"/>
  <line class="arrow" x1="850" y1="240" x2="880" y2="600"/>
</svg>
